  <line x1="136" y1="38" x2="130" y2="38" stroke="#efc84a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="176" y1="38" x2="182" y2="38" stroke="#efc84a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="142" y1="24" x2="137" y2="19" stroke="#efc84a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="170" y1="52" x2="175" y2="57" stroke="#efc84a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="170" y1="24" x2="175" y2="19" stroke="#efc84a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="142" y1="52" x2="137" y2="57" stroke="#efc84a" stroke-width="2.5" stroke-linecap="round"/>

